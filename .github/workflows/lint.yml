name: Lint Code Base

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      # This ensures all necessary linting packages are installed on GitHub's server
      run: npm install

    - name: Run ESLint
      # Added the specific config flag to help GitHub find your file
      run: npx eslint . --config eslint.config.mjs
